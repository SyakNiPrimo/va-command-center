<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Inspect</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
    }

    video {
      max-width: 96vw;
      max-height: 96vh;
      background: #000;
    }
  </style>
</head>
<body>
  <video id="video" muted playsinline preload="auto" src="file:///C:/Users/Benedick/Downloads/42610%20N%2022ND%20ST.mp4"></video>
  <script>
    const params = new URLSearchParams(location.search);
    const time = Number(params.get("t") || 0);
    const video = document.querySelector("#video");

    video.addEventListener("loadedmetadata", () => {
      video.currentTime = Math.min(Math.max(time, 0), video.duration || time);
    });

    video.addEventListener("seeked", () => {
      document.body.dataset.ready = "true";
    });
  </script>
</body>
</html>
